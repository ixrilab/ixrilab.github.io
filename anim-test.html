<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IXRI Logo Animation Test</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body { background: #f0f2f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
.wrap { width: 660px; position: relative; }
.wrap svg { width: 100%; }

.anim-bar-left, .anim-bar-right { opacity: 0; }
.anim-bar-left { animation: fadeSlideLeft 0.8s 0.3s ease-out forwards; }
.anim-bar-right { animation: fadeSlideRight 0.8s 0.3s ease-out forwards; }
.anim-label { font-family: 'Outfit', sans-serif; opacity: 0; }
.anim-label-fade { animation: fadeIn 0.6s 0.6s ease forwards, fadeOut 0.5s 3.0s ease forwards; }
.anim-label-fade-r { animation: fadeIn 0.6s 0.8s ease forwards, fadeOut 0.5s 3.0s ease forwards; }
.anim-curve { stroke-dasharray: 800; stroke-dashoffset: 800; }
.anim-curve-1 { animation: drawCurve 1.2s 1.6s ease-in-out forwards; }
.anim-curve-2 { animation: drawCurve 1.2s 1.8s ease-in-out forwards; }
.wrap svg { animation: fadeOut 0.6s 3.2s ease forwards; }
.final-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; opacity: 0; animation: logoReveal 0.8s 3.4s ease forwards; }

@keyframes fadeSlideLeft { from { opacity:0; transform: translateX(-30px); } to { opacity:1; transform: translateX(0); } }
@keyframes fadeSlideRight { from { opacity:0; transform: translateX(30px); } to { opacity:1; transform: translateX(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes fadeOut { from { opacity:1; } to { opacity:0; } }
@keyframes drawCurve { to { stroke-dashoffset: 0; } }
@keyframes logoReveal { from { opacity:0; transform: translate(-50%,-50%) scale(0.85); } to { opacity:1; transform: translate(-50%,-50%) scale(1); } }

button { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; font-size: 14px; background: #050E3C; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap" id="animWrap">
  <svg viewBox="0 0 660 260" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gc1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#050E3C"/><stop offset="100%" stop-color="#DC0000"/></linearGradient>
      <linearGradient id="gc2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#050E3C"/><stop offset="100%" stop-color="#DC0000"/></linearGradient>
    </defs>
    <g class="anim-bar-left"><rect x="195" y="22" width="22" height="216" rx="2" fill="#050E3C"/></g>
    <g class="anim-bar-right"><rect x="443" y="22" width="22" height="216" rx="2" fill="#DC0000"/></g>

    <text class="anim-label anim-label-fade" x="191" y="18" text-anchor="end" font-size="15" font-weight="300" fill="#718096" letter-spacing="0.5">human</text>
    <text class="anim-label anim-label-fade" x="191" y="18" text-anchor="end" font-size="15" font-weight="300" fill="#050E3C" letter-spacing="0.5" opacity="0"><tspan font-weight="300" fill="#718096">human </tspan></text>
    <text class="anim-label anim-label-fade" x="206" y="18" text-anchor="start" font-size="16" font-weight="700" fill="#050E3C" letter-spacing="0.3">Intelligence</text>

    <text class="anim-label anim-label-fade-r" x="453" y="18" text-anchor="end" font-size="15" font-weight="300" fill="#718096" letter-spacing="0.5">A</text>
    <text class="anim-label anim-label-fade-r" x="457" y="18" text-anchor="start" font-size="16" font-weight="700" fill="#DC0000" letter-spacing="0.3">Intelligence</text>

    <path class="anim-curve anim-curve-1" d="M206 40 C310 40, 350 220, 454 220" stroke="url(#gc1)" stroke-width="22" stroke-linecap="butt" fill="none"/>
    <path class="anim-curve anim-curve-2" d="M206 220 C310 220, 350 40, 454 40" stroke="url(#gc2)" stroke-width="22" stroke-linecap="butt" fill="none"/>

    <rect class="anim-bar-left" x="195" y="22" width="22" height="216" rx="2" fill="#050E3C"/>
    <rect class="anim-bar-right" x="443" y="22" width="22" height="216" rx="2" fill="#DC0000"/>
  </svg>
  <img class="final-logo" src="images/ixri-logo-gradient.png" alt="IXRI Logo">
</div>
<button onclick="location.reload()">Replay</button>
</body></html>
